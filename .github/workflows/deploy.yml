name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 拉取最新代码
            cd /opt/ticketsave_web
            sudo git pull origin main

            # 安装依赖并构建
            sudo npm install
            sudo npm run build

            # 同步到部署目录（保留 .env 和 data/）
            sudo rsync -av --exclude='.git' --exclude='node_modules' --exclude='data' --exclude='.env' /opt/ticketsave_web/ /opt/xysg-web/

            # 在部署目录安装依赖
            cd /opt/xysg-web
            sudo npm install

            # 重启容器
            sudo docker restart xysg-web
